<!doctype html>
<html lang="en" class="bg-black">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BoosTube</title>
    <link href="/src/style.css" rel="stylesheet" />
  </head>
  <body class="flex  flex-col bg-base-100 w-80 h-60 select-none overflow-hidden">
    <header class="w-full flex-center justify-between px-4 py-2 shrink-0 sticky">
      <a href="/" target="_blank" class="flex-center gap-1">
        <svg class="h-5 w-5" fill="currentColor" stroke="currentColor">
          <use href="/icons.svg#icon-fire"></use>
        </svg>
        <span class="font-bold font-mono">BoosTube</span>
      </a>
      <div class="flex-center">
        <button data-action="togglePower" class="btn btn-circle btn-sm btn-ghost">
          <svg class="h-4 w-4" fill="currentColor" stroke="currentColor">
            <use href="/icons.svg#icon-list"></use>
          </svg>
        </button>
      </div>
    </header>

    <main class="w-full h-auto min-h-0 text-sm font-medium flex-1 overflow-y-auto p-4 pt-1 ">
      <ul class="flex flex-col gap-1 w-full">
        <!-- Screenshot -->
        <li class="w-full bg-base-200 flex-start gap-3 px-3 py-2 rounded-md" title="Add a screenshot button to the video player">
          <input type="checkbox" checked="checked" class="toggle toggle-xs" />
          <span>Add Screenshot Button</span>
        </li>
        <!-- Theater Mode -->
        <li class="w-full bg-base-200 flex-start gap-3 px-3 py-2 rounded-md" title="Add a better theater mode button to the video player">
          <input type="checkbox" checked="checked" class="toggle toggle-xs" />
          <span>Add Better Theater Mode Button</span>
        </li>
      </ul>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
